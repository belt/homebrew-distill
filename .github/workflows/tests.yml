# Homebrew test-bot — builds, tests, and bottles formulae.
#
# Pipeline structure (mirrors mise task ordering):
#
#   TIER 1: FAST CHECKS (parallel)
#     - lint: tap syntax + spelling (seconds)
#
#   TIER 2: FORMULA VALIDATION (parallel matrix)
#     - test-bot: build + test + bottle (minutes)
#
# Based on `brew tap-new` canonical template with hardening:
#   - Top-level permissions: none (least-privilege)
#   - Third-party actions: SHA-pinned (supply chain)
#   - Homebrew actions: SHA-pinned (Homebrew/actions monorepo)
#   - Concurrency: cancel stale runs on same ref
#   - Timeout: 60 min (Rust source builds are slow)
#   - Path filters: skip on docs-only changes
#
# DRIFT AUDIT:
#   Every pinned SHA has a comment indicating its known version.
#   Periodic audit required to align with upstream release cadences.
#
#   Homebrew/actions        https://github.com/Homebrew/actions (monorepo)
#   actions/cache           https://github.com/actions/cache/releases
#   actions/upload-artifact https://github.com/actions/upload-artifact/releases
---
name: brew test-bot

on:
  push:
    branches:
      - main
    paths:
      - 'Formula/**'
      - '.github/workflows/tests.yml'
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1

jobs:
  # =========================================================================
  # TIER 1: FAST CHECKS (parallel with test-bot)
  # =========================================================================
  lint:
    name: lint (syntax + spelling)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@59e6b20d96df1a3c9ccb0aa402676e01a4cc6ff3  # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check tap syntax
        run: brew style belt/distill

      - name: Check spelling
        run: npx cspell --no-progress "**/*.{rb,md,yml,yaml}"

  # =========================================================================
  # TIER 2: FORMULA VALIDATION (parallel matrix)
  # =========================================================================
  test-bot:
    name: test-bot (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-26]
        include:
          - os: ubuntu-latest
            container: ghcr.io/homebrew/brew:main
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    timeout-minutes: 60
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@59e6b20d96df1a3c9ccb0aa402676e01a4cc6ff3  # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before
      - run: brew test-bot --only-setup
      - run: brew test-bot --only-tap-syntax

      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'
